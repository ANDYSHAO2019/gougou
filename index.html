<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>汪汪大作战</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="game-shell" aria-label="汪汪大作战">
      <section class="arena" id="arena">
        <div class="sky"></div>
        <div class="sun"></div>
        <div class="cloud cloud-a"></div>
        <div class="cloud cloud-b"></div>
        <div class="fence"></div>
        <div class="yard-toys">
          <span class="ball"></span>
          <span class="bone"></span>
        </div>

        <section class="select-screen" id="selectScreen">
          <header class="select-top">
            <strong id="selectTitle">选择你的狗</strong>
            <span id="wpText">WP 0</span>
          </header>
          <div class="dog-cards" id="dogCards"></div>
          <section class="online-panel" id="onlinePanel">
            <div class="mode-tabs" role="group" aria-label="对战模式">
              <button class="mode-tab active" id="aiModeBtn" type="button">AI 对战</button>
              <button class="mode-tab" id="onlineModeBtn" type="button">联网对战</button>
            </div>
            <div class="online-box hidden" id="onlineBox">
              <div class="room-status">
                <span id="roomStateBadge">好友房间</span>
                <strong id="onlineStatus">选择创建或加入房间</strong>
              </div>
              <div class="room-lobby" aria-label="房间成员">
                <article class="room-player local-player">
                  <span class="room-player-tag">你</span>
                  <strong id="localPlayerName">待选择</strong>
                  <small id="localPlayerDog">柴犬</small>
                  <em id="localReadyState">未进入房间</em>
                </article>
                <article class="room-player remote-player">
                  <span class="room-player-tag">朋友</span>
                  <strong id="remotePlayerName">等待加入</strong>
                  <small id="remotePlayerDog">--</small>
                  <em id="remoteReadyState">未连接</em>
                </article>
              </div>
              <div class="room-grid">
                <label>
                  房间号
                  <input id="roomCode" autocomplete="off" inputmode="text" placeholder="朋友输入这里，房主复制给朋友" />
                </label>
                <div class="online-actions">
                  <button class="secondary-action" id="hostOnlineBtn" type="button">创建房间</button>
                  <button class="secondary-action" id="joinOnlineBtn" type="button">加入房间</button>
                  <button class="secondary-action" id="copySignalBtn" type="button">复制邀请</button>
                  <button class="secondary-action" id="leaveOnlineBtn" type="button">离开房间</button>
                  <button class="primary-action online-enter" id="onlineEnterBtn" type="button">进入战斗场地</button>
                </div>
              </div>
            </div>
          </section>
          <div class="select-actions">
            <button class="secondary-action" id="assetEditorBtn" type="button">🎨 资源编辑</button>
            <button class="primary-action start-selected" id="confirmDogBtn" type="button">开始对战</button>
          </div>
        </section>

        <!-- 资源编辑器弹窗 -->
        <div class="asset-editor-modal hidden" id="assetEditorModal">
          <div class="asset-editor-panel">
            <header class="asset-editor-header">
              <strong>资源编辑器</strong>
              <button class="icon-btn" id="assetEditorClose" type="button">✕</button>
            </header>

            <nav class="asset-editor-tabs" role="tablist">
              <button class="asset-tab active" data-tab="bg">背景</button>
              <button class="asset-tab" data-tab="character">角色</button>
              <button class="asset-tab" data-tab="effects">特效</button>
              <button class="asset-tab" data-tab="ui">UI</button>
            </nav>

            <!-- 背景页 -->
            <div class="asset-tab-content active" id="tab-bg">
              <p class="asset-editor-hint">上传背景图片（推荐 1200×675px），替换场景背景。</p>
              <div class="asset-grid">
                <label class="asset-item" data-key="arenaBg">
                  <span class="asset-item-label">主背景图</span>
                  <div class="asset-item-preview"><img id="preview-arenaBg" alt="" /></div>
                  <input class="asset-item-input" type="file" accept="image/*" data-key="arenaBg" />
                  <button class="asset-item-clear" data-key="arenaBg" type="button">✕</button>
                </label>
                <label class="asset-item" data-key="skyColor">
                  <span class="asset-item-label">天空颜色</span>
                  <div class="asset-item-preview color-preview"><input type="color" id="preview-skyColor" value="#8ed8ff" data-key="skyColor" /></div>
                  <input class="asset-item-input" type="hidden" />
                  <button class="asset-item-clear" data-key="skyColor" type="button">✕</button>
                </label>
                <label class="asset-item" data-key="groundColor">
                  <span class="asset-item-label">地面颜色</span>
                  <div class="asset-item-preview color-preview"><input type="color" id="preview-groundColor" value="#7ed16a" data-key="groundColor" /></div>
                  <input class="asset-item-input" type="hidden" />
                  <button class="asset-item-clear" data-key="groundColor" type="button">✕</button>
                </label>
                <label class="asset-item" data-key="sunColor">
                  <span class="asset-item-label">太阳颜色</span>
                  <div class="asset-item-preview color-preview"><input type="color" id="preview-sunColor" value="#ffd85a" data-key="sunColor" /></div>
                  <input class="asset-item-input" type="hidden" />
                  <button class="asset-item-clear" data-key="sunColor" type="button">✕</button>
                </label>
                <label class="asset-item" data-key="cloudColor">
                  <span class="asset-item-label">云朵颜色</span>
                  <div class="asset-item-preview color-preview"><input type="color" id="preview-cloudColor" value="#ffffff" data-key="cloudColor" /></div>
                  <input class="asset-item-input" type="hidden" />
                  <button class="asset-item-clear" data-key="cloudColor" type="button">✕</button>
                </label>
                <label class="asset-item" data-key="fenceColor">
                  <span class="asset-item-label">围栏颜色</span>
                  <div class="asset-item-preview color-preview"><input type="color" id="preview-fenceColor" value="#f6c36a" data-key="fenceColor" /></div>
                  <input class="asset-item-input" type="hidden" />
                  <button class="asset-item-clear" data-key="fenceColor" type="button">✕</button>
                </label>
              </div>
            </div>

            <!-- 角色页 -->
            <div class="asset-tab-content" id="tab-character">
              <p class="asset-editor-hint">上传角色图片替换待机/攻击/死亡三个状态。</p>
              <div class="asset-grid">
                <label class="asset-item" data-key="happy">
                  <span class="asset-item-label">待机</span>
                  <div class="asset-item-preview"><img id="preview-happy" alt="" /></div>
                  <input class="asset-item-input" type="file" accept="image/*" data-key="happy" />
                  <button class="asset-item-clear" data-key="happy" type="button">✕</button>
                </label>
                <label class="asset-item" data-key="bark">
                  <span class="asset-item-label">攻击</span>
                  <div class="asset-item-preview"><img id="preview-bark" alt="" /></div>
                  <input class="asset-item-input" type="file" accept="image/*" data-key="bark" />
                  <button class="asset-item-clear" data-key="bark" type="button">✕</button>
                </label>
                <label class="asset-item" data-key="dead">
                  <span class="asset-item-label">死亡</span>
                  <div class="asset-item-preview"><img id="preview-dead" alt="" /></div>
                  <input class="asset-item-input" type="file" accept="image/*" data-key="dead" />
                  <button class="asset-item-clear" data-key="dead" type="button">✕</button>
                </label>
              </div>
            </div>

            <!-- 特效页 -->
            <div class="asset-tab-content" id="tab-effects">
              <p class="asset-editor-hint">调整特效颜色。图片特效使用角色页的图片。</p>
              <div class="asset-grid">
                <label class="asset-item" data-key="waveColor">
                  <span class="asset-item-label">音波颜色</span>
                  <div class="asset-item-preview color-preview"><input type="color" id="preview-waveColor" value="#ffe066" data-key="waveColor" /></div>
                  <input class="asset-item-input" type="hidden" />
                  <button class="asset-item-clear" data-key="waveColor" type="button">✕</button>
                </label>
                <label class="asset-item" data-key="sparkColor">
                  <span class="asset-item-label">星星颜色</span>
                  <div class="asset-item-preview color-preview"><input type="color" id="preview-sparkColor" value="#ff9f43" data-key="sparkColor" /></div>
                  <input class="asset-item-input" type="hidden" />
                  <button class="asset-item-clear" data-key="sparkColor" type="button">✕</button>
                </label>
                <label class="asset-item" data-key="koWinColor">
                  <span class="asset-item-label">胜利色</span>
                  <div class="asset-item-preview color-preview"><input type="color" id="preview-koWinColor" value="#83e17c" data-key="koWinColor" /></div>
                  <input class="asset-item-input" type="hidden" />
                  <button class="asset-item-clear" data-key="koWinColor" type="button">✕</button>
                </label>
                <label class="asset-item" data-key="koLoseColor">
                  <span class="asset-item-label">失败色</span>
                  <div class="asset-item-preview color-preview"><input type="color" id="preview-koLoseColor" value="#ff6b6b" data-key="koLoseColor" /></div>
                  <input class="asset-item-input" type="hidden" />
                  <button class="asset-item-clear" data-key="koLoseColor" type="button">✕</button>
                </label>
                <label class="asset-item" data-key="comboColor">
                  <span class="asset-item-label">COMBO 颜色</span>
                  <div class="asset-item-preview color-preview"><input type="color" id="preview-comboColor" value="#ffd84f" data-key="comboColor" /></div>
                  <input class="asset-item-input" type="hidden" />
                  <button class="asset-item-clear" data-key="comboColor" type="button">✕</button>
                </label>
                <label class="asset-item" data-key="dangerColor">
                  <span class="asset-item-label">危险色</span>
                  <div class="asset-item-preview color-preview"><input type="color" id="preview-dangerColor" value="#ff4d5e" data-key="dangerColor" /></div>
                  <input class="asset-item-input" type="hidden" />
                  <button class="asset-item-clear" data-key="dangerColor" type="button">✕</button>
                </label>
              </div>
            </div>

            <!-- UI页 -->
            <div class="asset-tab-content" id="tab-ui">
              <p class="asset-editor-hint">调整界面配色。</p>
              <div class="asset-grid">
                <label class="asset-item" data-key="btnPrimary">
                  <span class="asset-item-label">主按钮颜色</span>
                  <div class="asset-item-preview color-preview"><input type="color" id="preview-btnPrimary" value="#4caf50" data-key="btnPrimary" /></div>
                  <input class="asset-item-input" type="hidden" />
                  <button class="asset-item-clear" data-key="btnPrimary" type="button">✕</button>
                </label>
                <label class="asset-item" data-key="btnSecondary">
                  <span class="asset-item-label">次按钮颜色</span>
                  <div class="asset-item-preview color-preview"><input type="color" id="preview-btnSecondary" value="#2a3f2a" data-key="btnSecondary" /></div>
                  <input class="asset-item-input" type="hidden" />
                  <button class="asset-item-clear" data-key="btnSecondary" type="button">✕</button>
                </label>
                <label class="asset-item" data-key="cardBg">
                  <span class="asset-item-label">卡牌背景色</span>
                  <div class="asset-item-preview color-preview"><input type="color" id="preview-cardBg" value="#fff7db" data-key="cardBg" /></div>
                  <input class="asset-item-input" type="hidden" />
                  <button class="asset-item-clear" data-key="cardBg" type="button">✕</button>
                </label>
                <label class="asset-item" data-key="hudBg">
                  <span class="asset-item-label">HUD 背景色</span>
                  <div class="asset-item-preview color-preview"><input type="color" id="preview-hudBg" value="#ffffff" data-key="hudBg" /></div>
                  <input class="asset-item-input" type="hidden" />
                  <button class="asset-item-clear" data-key="hudBg" type="button">✕</button>
                </label>
                <label class="asset-item" data-key="micMeterColor">
                  <span class="asset-item-label">麦克风颜色</span>
                  <div class="asset-item-preview color-preview"><input type="color" id="preview-micMeterColor" value="#4caf50" data-key="micMeterColor" /></div>
                  <input class="asset-item-input" type="hidden" />
                  <button class="asset-item-clear" data-key="micMeterColor" type="button">✕</button>
                </label>
              </div>
            </div>

            <div class="asset-editor-actions">
              <button class="secondary-action" id="assetResetBtn" type="button">恢复默认</button>
              <button class="primary-action" id="assetSaveBtn" type="button">保存并应用</button>
            </div>
          </div>
        </div>

        <section class="battle-screen" id="battleScreen">
          <header class="battle-hud">
            <div class="dog-name player-name" id="playerName">← 柴犬</div>
            <div class="push-bar" aria-label="胜负推线条">
              <div class="push-side push-player" id="pushPlayer"></div>
              <div class="push-side push-enemy" id="pushEnemy"></div>
              <div class="push-center"></div>
              <div class="push-marker" id="pushMarker"></div>
            </div>
            <div class="dog-name enemy-name" id="enemyName">吉娃娃 →</div>
            <div class="round-status compact-status">
              <span id="timer">30</span>
              <small id="roundLabel">READY</small>
            </div>
          </header>

          <div class="combo" id="combo">COMBO x1</div>
          <div class="danger-label" id="dangerLabel">危险</div>
          <div class="bark-callout" id="barkCallout">叫!</div>
          <div class="ko-panel" id="koPanel" aria-live="polite">
            <div class="ko-card">
              <strong id="koTitle">K.O. WIN!!</strong>
              <span id="koReward">+150 WP</span>
              <button id="nextBtn" type="button">下一场</button>
            </div>
          </div>
          <div class="fx-layer" id="fxLayer"></div>

          <section class="stage">
            <article class="dog fighter player" id="playerDog" aria-label="玩家小狗">
              <img class="sprite-frame" id="playerSprite" alt="" />
              <div class="ear left-ear"></div>
              <div class="ear right-ear"></div>
              <div class="head">
                <span class="eye left-eye"></span>
                <span class="eye right-eye"></span>
                <span class="nose"></span>
                <span class="mouth"></span>
              </div>
              <div class="body">
                <span class="tail"></span>
                <span class="paw paw-a"></span>
                <span class="paw paw-b"></span>
              </div>
            </article>

            <div class="platform">
              <div class="countdown" id="countdown">点击开始</div>
            </div>

            <article class="dog fighter enemy" id="enemyDog" aria-label="AI 小狗">
              <img class="sprite-frame" id="enemySprite" alt="" />
              <div class="ear left-ear"></div>
              <div class="ear right-ear"></div>
              <div class="head">
                <span class="eye left-eye"></span>
                <span class="eye right-eye"></span>
                <span class="nose"></span>
                <span class="mouth"></span>
              </div>
              <div class="body">
                <span class="tail"></span>
                <span class="paw paw-a"></span>
                <span class="paw paw-b"></span>
              </div>
            </article>
          </section>

          <footer class="controls">
            <button class="primary-action" id="startBtn" type="button">开始对战</button>
            <button class="icon-action" id="muteBtn" type="button" aria-label="静音切换" title="静音切换">♪</button>
            <div class="mic-panel">
              <span class="mic-icon">MIC</span>
              <div class="meter-track">
                <div class="meter-fill" id="micMeter"></div>
              </div>
              <span id="micLabel">等待麦克风</span>
              <span class="bark-stats" id="barkStats">0/0</span>
            </div>
          </footer>
        </section>
      </section>
    </main>
    <script src="./game.js"></script>
  </body>
</html>
