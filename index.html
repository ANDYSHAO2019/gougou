<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>汪汪大作战</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="game-shell" aria-label="汪汪大作战">
      <section class="arena" id="arena">
        <div class="sky"></div>
        <div class="sun"></div>
        <div class="cloud cloud-a"></div>
        <div class="cloud cloud-b"></div>
        <div class="fence"></div>
        <div class="yard-toys">
          <span class="ball"></span>
          <span class="bone"></span>
        </div>

        <section class="select-screen" id="selectScreen">
          <header class="select-top">
            <strong id="selectTitle">选择你的狗</strong>
            <span id="wpText">WP 0</span>
          </header>
          <div class="dog-cards" id="dogCards"></div>
          <section class="online-panel" id="onlinePanel">
            <div class="mode-tabs" role="group" aria-label="对战模式">
              <button class="mode-tab active" id="aiModeBtn" type="button">AI 对战</button>
              <button class="mode-tab" id="onlineModeBtn" type="button">联网对战</button>
            </div>
            <div class="online-box hidden" id="onlineBox">
              <div class="room-status">
                <span id="roomStateBadge">好友房间</span>
                <strong id="onlineStatus">选择创建或加入房间</strong>
              </div>
              <div class="room-lobby" aria-label="房间成员">
                <article class="room-player local-player">
                  <span class="room-player-tag">你</span>
                  <strong id="localPlayerName">待选择</strong>
                  <small id="localPlayerDog">柴犬</small>
                  <em id="localReadyState">未进入房间</em>
                </article>
                <article class="room-player remote-player">
                  <span class="room-player-tag">朋友</span>
                  <strong id="remotePlayerName">等待加入</strong>
                  <small id="remotePlayerDog">--</small>
                  <em id="remoteReadyState">未连接</em>
                </article>
              </div>
              <div class="room-grid">
                <label>
                  房间号
                  <input id="roomCode" autocomplete="off" inputmode="text" placeholder="朋友输入这里，房主复制给朋友" />
                </label>
                <div class="online-actions">
                  <button class="secondary-action" id="hostOnlineBtn" type="button">创建房间</button>
                  <button class="secondary-action" id="joinOnlineBtn" type="button">加入房间</button>
                  <button class="secondary-action" id="copySignalBtn" type="button">复制邀请</button>
                  <button class="secondary-action" id="leaveOnlineBtn" type="button">离开房间</button>
                  <button class="primary-action online-enter" id="onlineEnterBtn" type="button">进入战斗场地</button>
                </div>
              </div>
            </div>
          </section>
          <div class="select-actions">
            <button class="secondary-action" id="spriteEditorBtn" type="button">编辑角色</button>
            <button class="primary-action start-selected" id="confirmDogBtn" type="button">开始对战</button>
          </div>
        </section>

        <!-- 角色编辑器弹窗 -->
        <div class="sprite-editor-modal hidden" id="spriteEditorModal">
          <div class="sprite-editor-panel">
            <header class="sprite-editor-header">
              <strong>角色编辑器</strong>
              <button class="icon-btn" id="spriteEditorClose" type="button">✕</button>
            </header>
            <p class="sprite-editor-hint">上传图片替换默认角色。点击格子或拖拽图片到格子上。</p>
            <div class="asset-editor-tabs" role="tablist" aria-label="资源类型">
              <button class="asset-tab active" type="button" data-tab="character">角色</button>
              <button class="asset-tab" type="button" data-tab="background">背景</button>
              <button class="asset-tab" type="button" data-tab="effects">特效</button>
              <button class="asset-tab" type="button" data-tab="data">配置</button>
            </div>
            <div class="sprite-slots asset-tab-panel active" id="spriteSlots" data-panel="character">
              <label class="sprite-slot" data-state="happy">
                <span class="slot-label">待机</span>
                <img class="slot-preview" id="slotHappy" alt="待机" />
                <input class="slot-input" type="file" accept="image/*" data-state="happy" />
                <button class="slot-clear" data-state="happy" type="button">✕</button>
              </label>
              <label class="sprite-slot" data-state="bark">
                <span class="slot-label">攻击</span>
                <img class="slot-preview" id="slotBark" alt="攻击" />
                <input class="slot-input" type="file" accept="image/*" data-state="bark" />
                <button class="slot-clear" data-state="bark" type="button">✕</button>
              </label>
              <label class="sprite-slot" data-state="dead">
                <span class="slot-label">死亡</span>
                <img class="slot-preview" id="slotDead" alt="死亡" />
                <input class="slot-input" type="file" accept="image/*" data-state="dead" />
                <button class="slot-clear" data-state="dead" type="button">✕</button>
              </label>
            </div>
            <section class="asset-tab-panel" id="assetPanelBackground" data-panel="background">
              <div class="editor-section-title">
                <strong>战斗背景</strong>
                <span>建议 16:9 横图，画面中心留给对战区域</span>
              </div>
              <label class="asset-upload-row">
                <span>背景图</span>
                <input id="assetBackgroundInput" type="file" accept="image/*" />
              </label>
              <div class="asset-background-preview" id="assetBackgroundPreview"></div>
            </section>
            <section class="asset-tab-panel" id="assetPanelEffects" data-panel="effects">
              <div class="editor-section-title">
                <strong>声波与文字粒子</strong>
                <span>调整整体打击感，不改变战斗数值</span>
              </div>
              <label class="asset-control-row">
                <span>玩家声波</span>
                <input id="assetWaveColor" type="color" value="#ffffff" />
              </label>
              <label class="asset-control-row">
                <span>对手声波</span>
                <input id="assetEnemyWaveColor" type="color" value="#ff5c48" />
              </label>
              <label class="asset-control-row">
                <span>文字粒子</span>
                <input id="assetGlyphs" type="text" value="汪,BARK!,WOOF!,@,#,!,*" />
              </label>
              <label class="asset-control-row">
                <span>粒子强度</span>
                <input id="assetParticleBoost" type="range" min="0.5" max="1.8" step="0.1" value="1" />
              </label>
            </section>
            <section class="asset-tab-panel" id="assetPanelData" data-panel="data">
              <div class="editor-section-title">
                <strong>配置导入导出</strong>
                <span>导出的 JSON 可以当作美术版本备份</span>
              </div>
              <textarea id="assetConfigText" spellcheck="false"></textarea>
              <div class="asset-config-actions">
                <button class="secondary-action" id="assetExportBtn" type="button">导出到文本框</button>
                <button class="secondary-action" id="assetImportBtn" type="button">从文本框导入</button>
              </div>
            </section>
            <div class="sprite-editor-actions">
              <button class="secondary-action" id="spriteResetBtn" type="button">恢复默认</button>
              <button class="primary-action" id="spriteSaveBtn" type="button">保存并应用</button>
            </div>
          </div>
        </div>

        <section class="battle-screen" id="battleScreen">
          <header class="battle-hud">
            <div class="dog-name player-name" id="playerName">← 柴犬</div>
            <div class="push-bar" aria-label="胜负推线条">
              <div class="push-side push-player" id="pushPlayer"></div>
              <div class="push-side push-enemy" id="pushEnemy"></div>
              <div class="push-center"></div>
              <div class="push-marker" id="pushMarker"></div>
            </div>
            <div class="dog-name enemy-name" id="enemyName">吉娃娃 →</div>
            <div class="round-status compact-status">
              <span id="timer">30</span>
              <small id="roundLabel">READY</small>
            </div>
          </header>

          <div class="combo" id="combo">COMBO x1</div>
          <div class="danger-label" id="dangerLabel">危险</div>
          <div class="bark-callout" id="barkCallout">叫!</div>
          <div class="ko-panel" id="koPanel" aria-live="polite">
            <div class="ko-card">
              <strong id="koTitle">K.O. WIN!!</strong>
              <span id="koReward">+150 WP</span>
              <button id="nextBtn" type="button">下一场</button>
            </div>
          </div>
          <div class="fx-layer" id="fxLayer"></div>

          <section class="stage">
            <article class="dog fighter player" id="playerDog" aria-label="玩家小狗">
              <img class="sprite-frame" id="playerSprite" alt="" />
              <div class="ear left-ear"></div>
              <div class="ear right-ear"></div>
              <div class="head">
                <span class="eye left-eye"></span>
                <span class="eye right-eye"></span>
                <span class="nose"></span>
                <span class="mouth"></span>
              </div>
              <div class="body">
                <span class="tail"></span>
                <span class="paw paw-a"></span>
                <span class="paw paw-b"></span>
              </div>
            </article>

            <div class="platform">
              <div class="countdown" id="countdown">点击开始</div>
            </div>

            <article class="dog fighter enemy" id="enemyDog" aria-label="AI 小狗">
              <img class="sprite-frame" id="enemySprite" alt="" />
              <div class="ear left-ear"></div>
              <div class="ear right-ear"></div>
              <div class="head">
                <span class="eye left-eye"></span>
                <span class="eye right-eye"></span>
                <span class="nose"></span>
                <span class="mouth"></span>
              </div>
              <div class="body">
                <span class="tail"></span>
                <span class="paw paw-a"></span>
                <span class="paw paw-b"></span>
              </div>
            </article>
          </section>

          <footer class="controls">
            <button class="primary-action" id="startBtn" type="button">开始对战</button>
            <button class="icon-action" id="muteBtn" type="button" aria-label="静音切换" title="静音切换">♪</button>
            <div class="mic-panel">
              <span class="mic-icon">MIC</span>
              <div class="meter-track">
                <div class="meter-fill" id="micMeter"></div>
              </div>
              <span id="micLabel">等待麦克风</span>
              <span class="bark-stats" id="barkStats">0/0</span>
            </div>
          </footer>
        </section>
      </section>
    </main>
    <script src="./game.js"></script>
  </body>
</html>
