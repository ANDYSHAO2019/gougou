upstream gougou_room_backend {
    server 127.0.0.1:3001;
    keepalive 32;
}

server {
    listen 80;
    server_name gougou.8.220.135.31.sslip.io;

    location /.well-known/acme-challenge/ {
        root /var/www/gougou-certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name gougou.8.220.135.31.sslip.io;

    ssl_certificate /etc/letsencrypt/live/gougou.8.220.135.31.sslip.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gougou.8.220.135.31.sslip.io/privkey.pem;

    location / {
        proxy_pass http://gougou_room_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }
}
